name: Deploy demo to GitHub Pages

# Builds the backend-free demo (data in the browser) and publishes it to
# GitHub Pages — a free, no-account, no-card live link.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build static demo
        env:
          VITE_STATIC: "true"
          # Serve from the repo's Pages subpath (e.g. /ses/), derived from the
          # repo name so this works no matter which repo it's pushed to.
          VITE_BASE: "/${{ github.event.repository.name }}/"
        run: npm run build
      - uses: actions/configure-pages@v5
        with:
          # Enable Pages via the workflow's own token so no manual repo setup
          # (or admin collaborator) is needed.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
